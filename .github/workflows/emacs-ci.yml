name: Emacs Config CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  emacs-29-ubuntu-22:
    name: Emacs 29.0.3 on Ubuntu 22.04
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04

    steps:
      - uses: actions/checkout@v3

      - name: Install Emacs and dependencies
        run: |
          apt-get update
          apt-get install -y emacs git make

      - name: Clone Emacs config to ~/.emacs.d
        run: |
          git clone https://github.com/yilkalargaw/rtfm-emacs ~/.emacs.d

      - name: Byte-compile configuration
        run: |
          emacs -batch -Q \
            --eval "(setq warning-minimum-level :error)" \
            --eval "(setq byte-compile-error-on-warn nil)" \
            -f batch-byte-compile ~/.emacs.d/*.el 2> warnings.txt || true

      - name: Show warnings (if any)
        run: |
          if [ -s warnings.txt ]; then
            echo "::warning::Byte-compilation warnings found"
            cat warnings.txt
          fi

      - name: Check for errors (fail the build if any)
        run: |
          if grep -q "Error" warnings.txt; then
            echo "::error::Errors found during byte-compilation"
            cat warnings.txt
            exit 1
          fi

