name: Emacs Config CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  emacs-29-ubuntu-22:
    name: Emacs 29.0.3 on Ubuntu 22.04
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04

    steps:
      - uses: actions/checkout@v3

      - name: Install Emacs 29 and dependencies
        run: |
          apt-get update
          apt-get install -y emacs git make

      - name: Byte-compile config
        run: |
          mkdir -p ~/.emacs.d
          ln -s "$PWD" ~/.emacs.d/rtfm-emacs
          emacs -batch -Q \
            --eval "(setq warning-minimum-level :error)" \
            --eval "(add-to-list 'load-path \"~/.emacs.d/rtfm-emacs\")" \
            --eval "(setq byte-compile-error-on-warn t)" \
            -f batch-byte-compile ~/.emacs.d/rtfm-emacs/*.el 2> warnings.txt || true

      - name: Check warnings
        run: |
          if [ -s warnings.txt ]; then
            echo "::warning::Byte-compilation warnings found"
            cat warnings.txt
            exit 1
          fi

