name: Emacs Config CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  emacs-29-ubuntu-22:
    name: Emacs 29.0.3 on Ubuntu 22.04
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04
    steps:
      - uses: actions/checkout@v3

      - name: Install Emacs 29.0.3 and dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            wget \
            git \
            build-essential \
            libgtk-3-dev \
            libxpm-dev \
            libjpeg-dev \
            libgif-dev \
            libtiff-dev \
            libncurses-dev \
            libgnutls28-dev \
            libjansson-dev \
            libxml2-dev \
            libtree-sitter-dev \
            libgccjit-10-dev \
            libharfbuzz-dev \
            libwebkit2gtk-4.0-dev

          wget https://ftp.gnu.org/gnu/emacs/emacs-29.0.3.tar.gz
          tar -xzf emacs-29.0.3.tar.gz
          cd emacs-29.0.3
          ./configure --without-pop
          make -j$(nproc)
          make install

      - name: Setup and byte-compile
        run: |
          mkdir -p ~/.emacs.d
          ln -s "$PWD" ~/.emacs.d/rtfm-emacs
          emacs -batch -Q \
            --eval "(setq warning-minimum-level :error)" \
            --eval "(add-to-list 'load-path \"~/.emacs.d/rtfm-emacs\")" \
            --eval "(setq byte-compile-error-on-warn t)" \
            -f batch-byte-compile ~/.emacs.d/rtfm-emacs/*.el 2> warnings.txt || true

      - name: Show warnings
        run: |
          if [ -s warnings.txt ]; then
            echo "::warning::Byte-compilation warnings found"
            cat warnings.txt
            exit 1
          else
            echo "No byte-compilation warnings."
          fi

  emacs-25-ubuntu-18:
    name: Emacs 25.2.1 on Ubuntu 18.04
    runs-on: ubuntu-latest
    container:
      image: ubuntu:18.04
    steps:
      - uses: actions/checkout@v3

      - name: Install Emacs 25.2.1 and dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends software-properties-common
          add-apt-repository ppa:kelleyk/emacs
          apt-get update
          apt-get install -y emacs25

      - name: Setup and byte-compile
        run: |
          mkdir -p ~/.emacs.d
          ln -s "$PWD" ~/.emacs.d/rtfm-emacs
          emacs25 -batch -Q \
            --eval "(setq warning-minimum-level :error)" \
            --eval "(add-to-list 'load-path \"~/.emacs.d/rtfm-emacs\")" \
            --eval "(setq byte-compile-error-on-warn t)" \
            -f batch-byte-compile ~/.emacs.d/rtfm-emacs/*.el 2> warnings.txt || true

      - name: Show warnings
        run: |
          if [ -s warnings.txt ]; then
            echo "::warning::Byte-compilation warnings found"
            cat warnings.txt
            exit 1
          else
            echo "No byte-compilation warnings."
          fi

  emacs-24-ubuntu-16:
    name: Emacs 24.5.1 on Ubuntu 16.04
    runs-on: ubuntu-latest
    container:
      image: ubuntu:16.04
    steps:
      - uses: actions/checkout@v3

      - name: Install Emacs 24.5.1 and dependencies
        run: |
          apt-get update
          apt-get install -y emacs24 git make

      - name: Setup and byte-compile
        run: |
          mkdir -p ~/.emacs.d
          ln -s "$PWD" ~/.emacs.d/rtfm-emacs
          emacs24 -batch -Q \
            --eval "(setq warning-minimum-level :error)" \
            --eval "(add-to-list 'load-path \"~/.emacs.d/rtfm-emacs\")" \
            --eval "(setq byte-compile-error-on-warn t)" \
            -f batch-byte-compile ~/.emacs.d/rtfm-emacs/*.el 2> warnings.txt || true

      - name: Show warnings
        run: |
          if [ -s warnings.txt ]; then
            echo "::warning::Byte-compilation warnings found"
            cat warnings.txt
            exit 1
          else
            echo "No byte-compilation warnings."
          fi
